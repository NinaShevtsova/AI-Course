name: Setup GitHub Copilot with Playwright MCP

on: [workflow_dispatch]

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Playwright MCP
        run: |
          npm install
          npx playwright install chromium