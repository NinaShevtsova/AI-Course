name: Playwright Tests

on:
  pull_request:
    branches: [ main ]

# Cancel in-progress runs for the same PR
concurrency:
  group: playwright-${{ github.event.pull_request.number }}
  cancel-in-progress: true

# Minimal read-only permissions
permissions:
  contents: read

jobs:
  playwright-tests:
    name: playwright-tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: true

    steps:
      # Check out the repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up Node.js LTS with npm cache
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      # Install dependencies using npm ci (clean, reproducible install)
      - name: Install dependencies
        working-directory: AI-Assisted-Pipeline-Configuration
        run: npm ci

      # Install Playwright browsers along with required system dependencies
      - name: Install Playwright browsers
        working-directory: AI-Assisted-Pipeline-Configuration
        run: npx playwright install --with-deps

      # Run all Playwright tests in parallel
      - name: Run Playwright tests
        working-directory: AI-Assisted-Pipeline-Configuration
        run: npx playwright test

      # Upload the HTML report for review (always, even on failure)
      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: AI-Assisted-Pipeline-Configuration/playwright-report

      # Upload Playwright traces for debugging failed tests (always, even on failure)
      - name: Upload Playwright traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: AI-Assisted-Pipeline-Configuration/test-results/**/trace*.zip

      # Notify Microsoft Teams channel when the workflow fails
      - name: Notify Teams on failure
        if: failure()
        run: |
          curl -H "Content-Type: application/json" -d '{
            "@type": "MessageCard",
            "@context": "https://schema.org/extensions",
            "summary": "Playwright Tests Failed",
            "themeColor": "FF0000",
            "title": "❌ Playwright Tests Failed",
            "sections": [{
              "facts": [
                { "name": "PR Title", "value": "${{ github.event.pull_request.title }}" },
                { "name": "Author",   "value": "${{ github.event.pull_request.user.login }}" },
                { "name": "Branch",   "value": "${{ github.head_ref }}" },
                { "name": "Run",      "value": "[View failed run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" }
              ]
            }]
          }' "${{ secrets.TEAMS_WEBHOOK_URL }}"
